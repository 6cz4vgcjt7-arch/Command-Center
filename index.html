<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#FAF8F2">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css?v=1.1.2">
  <title>Seasons</title>
  <script>
    window.SEASONS_VERSION = "v1.2.1";
    window.SEASONS_BOOT_ERRORS = [];
    window.addEventListener("error", function(event){
      window.SEASONS_BOOT_ERRORS.push((event.message || "Error") + (event.filename ? " @ " + event.filename.split('/').pop() + ":" + event.lineno : ""));
      document.documentElement.classList.add("seasons-boot-error");
    });
    window.addEventListener("unhandledrejection", function(event){
      window.SEASONS_BOOT_ERRORS.push("Promise: " + ((event.reason && event.reason.message) || event.reason || "Unknown"));
      document.documentElement.classList.add("seasons-boot-error");
    });
    window.SEASONS_HIDE_SPLASH = function(){
      var splash = document.getElementById("splash");
      if (splash) splash.classList.add("hiddenSplash");
    };
    setTimeout(window.SEASONS_HIDE_SPLASH, 2000);
    setTimeout(function(){
      var splash = document.getElementById("splash");
      var active = document.querySelector(".screen.active");
      if (splash && !splash.classList.contains("hiddenSplash")) window.SEASONS_HIDE_SPLASH();
      if (document.documentElement.classList.contains("seasons-boot-error") && active && !document.getElementById("startupError")) {
        active.innerHTML = '<div id="startupError" class="startupError card"><div class="screenTitle">Seasons had trouble starting.</div><p class="sub">The app recovered from a startup error instead of staying stuck on the opening screen.</p><button class="btn" onclick="location.reload()">Reload Seasons</button><button class="btn secondary" onclick="caches&&caches.keys().then(function(keys){return Promise.all(keys.map(function(k){return caches.delete(k)}))}).then(function(){location.reload()})">Clear cache and reload</button><p class="tinyNote">Version v1.2.1</p></div>';
      }
    }, 2500);
  </script>
</head>
<body>
  <div id="splash" class="splash" aria-hidden="true"><div class="splashMark"></div><div class="splashWord">seasons</div></div>
  <div class="app">
    <main>
      <section id="onboarding" class="screen"></section>
      <section id="command" class="screen active"></section>
      <section id="review" class="screen"></section>
      <section id="accounts" class="screen"></section>
      <section id="settings" class="screen"></section>
    </main>

    <nav class="nav" aria-label="Primary navigation">
      <button class="active" data-screen="command" aria-label="Command"><span class="navIcon navCommand"></span><span>Command</span></button>
      <button data-screen="review" aria-label="Review"><span class="navIcon navReview"></span><span>Review</span></button>
      <button data-screen="accounts" aria-label="Accounts"><span class="navIcon navAccounts"></span><span>Accounts</span></button>
      <button data-screen="settings" aria-label="Settings"><span class="navIcon navSettings"></span><span>Settings</span></button>
    </nav>
  </div>

  <script src="storage.js?v=1.1.2"></script>
  <script src="engine.js?v=1.1.2"></script>
  <script src="ui.js?v=1.1.2"></script>
  <script src="app.js?v=1.1.2"></script>

<script>
(function(){
  window.SEASONS_VERSION="v1.2.1";
  window.SEASONS_BUILD=121;
  function replaceText(){
    const w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT);
    let n;
    while(n=w.nextNode()){
      n.nodeValue=n.nodeValue.replace(/v1\.1\.3/g,"v1.2.1").replace(/v1\.2\.0/g,"v1.2.1").replace(/Build 113/g,"Build 121").replace(/Build 120/g,"Build 121");
    }
  }
  function hideFalseUpdate(){
    document.querySelectorAll("*").forEach(function(el){
      const t=(el.textContent||"").trim();
      if(/New version available/i.test(t)&&(/v1\.2\.0|v1\.2\.1/i.test(t))) el.style.display="none";
    });
  }
  function fixFoundationNames(){
    document.querySelectorAll("*").forEach(function(el){
      const t=(el.textContent||"").replace(/\s+/g," ").trim();
      if(t==="Account Emergency Fund"||t==="Account Emergency Fund $2,000"){
        el.querySelectorAll("*").forEach(function(c){
          if((c.textContent||"").trim()==="Account") c.textContent="Emergency Fund";
        });
      }
    });
  }
  function run(){replaceText();hideFalseUpdate();fixFoundationNames();}
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",run);else run();
  setInterval(run,1500);
})();
</script>

</body>
</html>
